name: Crawl Facilities

on:
  schedule:
    # 毎週月曜 18:00 UTC（= JST 火曜 AM 3:00）
    - cron: '0 18 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ダウンロードをスキップしキャッシュを使う'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache crawl data
        uses: actions/cache@v4
        with:
          path: .cache
          key: bodik-cache-${{ github.run_id }}
          restore-keys: |
            bodik-cache-

      - name: Crawl
        run: node scripts/crawl.js ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}

      - name: Validate
        run: npm test

      # 生成物 api/ は Git 管理外（.gitignore）。README の統計だけを main に反映する。
      - name: Commit README stats
        run: |
          if git diff --quiet README.md; then
            echo "README 変更なし"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update README data stats"
            git push
          fi

      # 生成した api/ を gh-pages へ配信する（main にはコミットしない）。
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: 'node_modules,.cache,scripts,.github'
